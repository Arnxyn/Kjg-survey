<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Survey Pelanggan | Suara Anda Berarti</title>
<!-- Google Fonts untuk tipografi lebih elegan -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<!-- Font Awesome 6 (free icons) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 10% 30%, #0a0f2a, #030614);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    position: relative;
  }

  /* decorative animated bg */
  body::before {
    content: '';
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    background-image: radial-gradient(circle at 20% 40%, rgba(34,197,94,0.08) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  /* glassmorphic card */
  .survey-card {
    max-width: 780px;
    width: 100%;
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(18px);
    border-radius: 2rem;
    border: 1px solid rgba(34, 197, 94, 0.25);
    box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(34,197,94,0.1) inset;
    transition: all 0.3s ease;
    position: relative;
    z-index: 2;
    overflow: hidden;
  }

  .survey-header {
    padding: 1.8rem 2rem 0.8rem 2rem;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: linear-gradient(115deg, rgba(34,197,94,0.05) 0%, rgba(0,0,0,0) 70%);
  }

  .survey-header h2 {
    font-size: 1.9rem;
    font-weight: 700;
    background: linear-gradient(135deg, #f0f9ff, #cafcde);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    letter-spacing: -0.3px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }

  .survey-header h2 i {
    background: none;
    background-clip: unset;
    -webkit-background-clip: unset;
    color: #22c55e;
    font-size: 1.8rem;
  }

  .sub {
    color: #9ca9c9;
    margin-top: 8px;
    font-size: 0.9rem;
    font-weight: 400;
  }

  /* form area */
  .form-content {
    padding: 1.8rem 2rem 2rem 2rem;
  }

  /* modern select styling */
  .custom-select-wrapper {
    margin-bottom: 2rem;
  }

  .select-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #cbd5e6;
    font-size: 0.9rem;
    letter-spacing: 0.3px;
  }

  .select-label i {
    color: #22c55e;
    font-size: 1rem;
  }

  select {
    width: 100%;
    padding: 14px 18px;
    border-radius: 20px;
    background: #0b1120;
    border: 1px solid rgba(34,197,94,0.3);
    color: #eef2ff;
    font-family: 'Inter', monospace;
    font-size: 0.95rem;
    font-weight: 500;
    transition: all 0.25s ease;
    cursor: pointer;
    appearance: none;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%2322c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
    background-repeat: no-repeat;
    background-position: right 18px center;
    background-size: 18px;
  }

  select:hover, select:focus {
    border-color: #22c55e;
    box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
    outline: none;
    background-color: #0f1628;
  }

  /* question item */
  .question-item {
    margin-bottom: 1.8rem;
    background: rgba(0, 0, 0, 0.25);
    border-radius: 1.5rem;
    padding: 1.1rem 1.2rem;
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .question-item:hover {
    border-color: rgba(34,197,94,0.25);
    background: rgba(34,197,94,0.02);
  }

  .question-text {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-weight: 600;
    margin-bottom: 1rem;
    font-size: 1.05rem;
    color: #f5f5f5;
  }

  .question-text .q-num {
    background: #22c55e20;
    color: #86efac;
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: bold;
  }

  .question-text span:last-child {
    color: #eef2ff;
  }

  /* emoji / icon per pertanyaan */
  .q-icon {
    margin-left: auto;
    font-size: 1.3rem;
    opacity: 0.6;
  }

  /* scale modern */
  .scale-rating {
    display: flex;
    justify-content: space-between;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .scale-option {
    flex: 1;
    text-align: center;
    min-width: 50px;
  }

  .scale-option input {
    display: none;
  }

  .scale-option label {
    display: block;
    padding: 10px 0;
    background: #0a0f1c;
    border-radius: 60px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s ease;
    border: 1px solid #1f2a44;
    color: #bfc9e2;
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }

  .scale-option input:checked + label {
    background: linear-gradient(145deg, #22c55e, #15803d);
    color: white;
    border-color: #22c55e;
    box-shadow: 0 8px 18px -6px #22c55e70;
    transform: scale(1.02);
  }

  .scale-option label:hover {
    background: #1f2c4b;
    transform: translateY(-2px);
    border-color: #4ade80;
  }

  /* tooltip value kecil */
  .scale-value-hint {
    font-size: 0.7rem;
    color: #7e8bb0;
    margin-top: 4px;
    display: block;
  }

  /* tombol kirim */
  .submit-btn {
    width: 100%;
    margin-top: 1.2rem;
    background: linear-gradient(95deg, #22c55e, #16a34a);
    border: none;
    padding: 15px 10px;
    border-radius: 40px;
    font-weight: 700;
    font-size: 1.1rem;
    color: #020617;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.3px;
    box-shadow: 0 5px 15px rgba(34,197,94,0.3);
  }

  .submit-btn i {
    font-size: 1.2rem;
    transition: transform 0.2s;
  }

  .submit-btn:hover {
    background: linear-gradient(95deg, #2bcc65, #0f8a41);
    transform: scale(1.02);
    box-shadow: 0 12px 28px -8px #22c55e;
  }

  .submit-btn:active {
    transform: scale(0.98);
  }

  /* footer credit */
  .footer-note {
    text-align: center;
    font-size: 0.7rem;
    margin-top: 1.5rem;
    color: #4b556d;
    border-top: 1px solid rgba(255,255,255,0.05);
    padding-top: 1.2rem;
    display: flex;
    justify-content: center;
    gap: 12px;
  }

  .footer-note i {
    font-size: 0.7rem;
  }

  /* animasi fade in */
  @keyframes floatIn {
    0% { opacity: 0; transform: translateY(25px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .survey-card {
    animation: floatIn 0.6s ease-out;
  }

  /* responsive */
  @media (max-width: 540px) {
    .form-content {
      padding: 1.5rem;
    }
    .scale-option label {
      font-size: 0.85rem;
      padding: 8px 0;
    }
    .question-text {
      font-size: 0.95rem;
    }
    .survey-header h2 {
      font-size: 1.5rem;
    }
  }

  /* required star */
  .required-star {
    color: #f97316;
    margin-left: 4px;
  }

  /* status badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(34,197,94,0.15);
    border-radius: 40px;
    padding: 4px 12px;
    font-size: 0.7rem;
    color: #86efac;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="survey-card">
  <div class="survey-header">
    <h2>
      <i class="fas fa-clipboard-list"></i> 
      Suara Pelanggan
    </h2>
    <div class="sub">
      <i class="fas fa-chart-line"></i> Bantu kami berkembang &nbsp;•&nbsp; <i class="fas fa-star" style="color:#FFD966;"></i> 1–5 rating
    </div>
  </div>

  <div class="form-content">
    <!-- FORM DENGAN ACTION GOOGLE SCRIPT BARU (SPREADSHEET YANG ANDA BERIKAN) -->
    <form method="POST"
          action="https://script.google.com/macros/s/AKfycbzKi8VB-2eoA1lJkhF1sHdhPP0WvWL2QSEdOXO_VDRHCtmpljqQTlPlKu2bpc7RPtsv/exec"
          target="hidden_iframe"
          id="surveyForm"
          onsubmit="return handleSubmit(event)">

      <!-- Q1: Menarik? -->
      <div class="question-item" data-q="1">
        <div class="question-text">
          <span class="q-num">1</span>
          <span>1. Seberapa menarik layanan kami?</span>
          <i class="fas fa-grin-stars q-icon"></i>
        </div>
        <div class="scale-rating" data-qname="q1"></div>
      </div>

      <!-- Q2: Sesuai kebutuhan? -->
      <div class="question-item" data-q="2">
        <div class="question-text">
          <span class="q-num">2</span>
          <span>2. Seberapa sesuai layanan dengan kebutuhan Anda?</span>
          <i class="fas fa-hand-holding-heart q-icon"></i>
        </div>
        <div class="scale-rating" data-qname="q2"></div>
      </div>

      <!-- Q3: Mudah dipahami? -->
      <div class="question-item" data-q="3">
        <div class="question-text">
          <span class="q-num">3</span>
          <span>3. Seberapa mudah memahami layanan kami?</span>
          <i class="fas fa-brain q-icon"></i>
        </div>
        <div class="scale-rating" data-qname="q3"></div>
      </div>

      <!-- Q4: Kemungkinan pakai? -->
      <div class="question-item" data-q="4">
        <div class="question-text">
          <span class="q-num">4</span>
          <span>4. Seberapa besar kemungkinan Anda menggunakan layanan kami?</span>
          <i class="fas fa-share-alt q-icon"></i>
        </div>
        <div class="scale-rating" data-qname="q4"></div>
      </div>

      <!-- Q5: Kepuasan? -->
      <div class="question-item" data-q="5">
        <div class="question-text">
          <span class="q-num">5</span>
          <span>5. Seberapa puas Anda dengan konsep layanan kami?</span>
          <i class="fas fa-smile-beam q-icon"></i>
        </div>
        <div class="scale-rating" data-qname="q5"></div>
      </div>

      <button type="submit" class="submit-btn">
        <i class="fas fa-paper-plane"></i> Kirim Survey
        <i class="fas fa-check-circle"></i>
      </button>
    </form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
  // === Generate skala 1-5 untuk setiap pertanyaan ===
  function buildRatingScale(container, questionName) {
    if (!container) return;
    container.innerHTML = '';
    const ratings = [1, 2, 3, 4, 5];
    const subTexts = ['Sangat Buruk', 'Kurang', 'Cukup', 'Baik', 'Luar Biasa'];
    
    ratings.forEach(val => {
      const idx = val - 1;
      const optionDiv = document.createElement('div');
      optionDiv.className = 'scale-option';
      
      const radioId = `${questionName}_${val}_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = questionName;   // q1, q2, q3, q4, q5
      radio.value = val;
      radio.id = radioId;
      // required hanya pada radio pertama di group
      if (val === 1) radio.required = true;
      
      const label = document.createElement('label');
      label.htmlFor = radioId;
      label.innerHTML = `${val} <span class="scale-value-hint" style="display:block; font-size:0.65rem;">${subTexts[idx]}</span>`;
      
      optionDiv.appendChild(radio);
      optionDiv.appendChild(label);
      container.appendChild(optionDiv);
    });
  }
  
  // Inisialisasi semua skala berdasarkan data-qname
  const scaleContainers = document.querySelectorAll('.scale-rating');
  scaleContainers.forEach(container => {
    const qname = container.getAttribute('data-qname');
    if (qname && ['q1', 'q2', 'q3', 'q4', 'q5'].includes(qname)) {
      buildRatingScale(container, qname);
    }
  });
  
  // === TOAST NOTIFICATION ===
  function showToast(message, bgColor = '#22c55e', icon = 'fa-bell') {
    const existingToast = document.querySelector('.custom-toast-notif');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement('div');
    toast.className = 'custom-toast-notif';
    toast.innerHTML = `
      <div style="display: flex; align-items: center; gap: 12px;">
        <i class="fas ${icon}" style="font-size: 20px;"></i>
        <span>${message}</span>
      </div>
    `;
    toast.style.position = 'fixed';
    toast.style.bottom = '30px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.backgroundColor = bgColor;
    toast.style.color = '#fff';
    toast.style.padding = '12px 24px';
    toast.style.borderRadius = '60px';
    toast.style.fontWeight = '600';
    toast.style.fontSize = '0.9rem';
    toast.style.zIndex = '9999';
    toast.style.boxShadow = '0 10px 25px -5px rgba(0,0,0,0.3)';
    toast.style.backdropFilter = 'blur(8px)';
    toast.style.border = '1px solid rgba(255,255,255,0.2)';
    toast.style.fontFamily = "'Inter', sans-serif";
    toast.style.letterSpacing = '0.3px';
    document.body.appendChild(toast);
    
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.3s';
      setTimeout(() => toast.remove(), 400);
    }, 3200);
  }
  
  // === HANDLE SUBMIT: validasi dan kirim ke Google Spreadsheet (URL baru) ===
  function handleSubmit(event) {
    event.preventDefault();
    
    const form = document.getElementById('surveyForm');
    const cvSelect = document.getElementById('cvSelect');
    
    // Validasi CV
    if (!cvSelect.value) {
      showToast('⚠️ Silakan pilih CV terlebih dahulu', '#f97316', 'fa-exclamation-triangle');
      cvSelect.focus();
      return false;
    }
    
    // Validasi semua pertanyaan (q1 - q5)
    const questionNames = ['q1', 'q2', 'q3', 'q4', 'q5'];
    let allValid = true;
    let firstInvalid = null;
    
    for (let q of questionNames) {
      const radios = document.querySelectorAll(`input[name="${q}"]`);
      const isChecked = Array.from(radios).some(r => r.checked);
      if (!isChecked) {
        allValid = false;
        firstInvalid = q;
        // highlight pertanyaan yang belum diisi
        const container = radios[0]?.closest('.question-item');
        if (container) {
          container.style.transition = '0.2s';
          container.style.border = '1px solid #f97316';
          container.style.backgroundColor = 'rgba(249,115,22,0.08)';
          setTimeout(() => {
            container.style.border = '';
            container.style.backgroundColor = '';
          }, 1500);
        }
        break;
      }
    }
    
    if (!allValid) {
      showToast(`❗ Pertanyaan ${firstInvalid?.slice(1)} belum dinilai (1-5)`, '#f97316', 'fa-exclamation-circle');
      return false;
    }
    
    // Tampilkan loading state
    const btn = document.querySelector('.submit-btn');
    const originalBtnHTML = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Menyimpan ke Spreadsheet...';
    btn.disabled = true;
    
    // Siapkan iframe untuk menangkap response dari Google Apps Script
    const iframe = document.querySelector('iframe[name="hidden_iframe"]');
    let isIframeLoaded = false;
    let timeoutId = null;
    
    const resetAndReload = (success = true) => {
      if (success) {
        showToast('✅ Terima kasih! Data tersimpan ke Google Spreadsheet.', '#22c55e', 'fa-check-circle');
      } else {
        showToast('⚠️ Data terkirim, periksa koneksi atau coba lagi nanti.', '#f97316', 'fa-cloud-upload-alt');
      }
      
      setTimeout(() => {
        // Reset semua pilihan radio dan select
        document.querySelectorAll('input[type="radio"]').forEach(radio => radio.checked = false);
        if (cvSelect) cvSelect.value = '';
        // Reset tombol
        btn.disabled = false;
        btn.innerHTML = originalBtnHTML;
        // Reload halaman agar form fresh
        setTimeout(() => {
          window.location.reload();
        }, 800);
      }, 1500);
    };
    
    // Handler jika iframe berhasil load (response dari Google Script)
    const onIframeLoad = () => {
      if (isIframeLoaded) return;
      isIframeLoaded = true;
      if (timeoutId) clearTimeout(timeoutId);
      resetAndReload(true);
    };
    
    if (iframe) {
      iframe.addEventListener('load', onIframeLoad);
      // Timeout cadangan jika iframe tidak merespon (misal network lambat)
      timeoutId = setTimeout(() => {
        if (!isIframeLoaded) {
          console.warn('Iframe load timeout, namun form sudah terkirim ke spreadsheet');
          resetAndReload(true);
        }
      }, 5000);
    } else {
      // Fallback jika tidak ada iframe
      timeoutId = setTimeout(() => {
        resetAndReload(true);
      }, 2000);
    }
    
    // Submit form ke Google Apps Script URL yang baru
    form.submit();
    
    return true;
  }
  
  // Efek hover tambahan untuk question items
  const questionDivs = document.querySelectorAll('.question-item');
  questionDivs.forEach(q => {
    q.addEventListener('mouseenter', () => {
      q.style.transform = 'translateX(4px)';
    });
    q.addEventListener('mouseleave', () => {
      q.style.transform = '';
    });
  });
  
  // Pesan konfirmasi di console
  console.log('✅ Form survey terhubung ke Google Spreadsheet dengan URL:');
  console.log('https://script.google.com/macros/s/AKfycbzKi8VB-2eoA1lJkhF1sHdhPP0WvWL2QSEdOXO_VDRHCtmpljqQTlPlKu2bpc7RPtsv/exec');
  console.log('Data akan tersimpan otomatis ke dalam sheet Anda.');
</script>
</body>
</html>
